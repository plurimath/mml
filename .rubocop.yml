inherit_from:
  - https://raw.githubusercontent.com/riboseinc/oss-guides/master/ci/rubocop.yml
  - .rubocop_todo.yml

plugins:
- rubocop-performance
- rubocop-rake
- rubocop-rspec

AllCops:
  TargetRubyVersion: 3.0
  NewCops: enable
  Exclude:
    - 'vendor/**/*'
    - 'spec/fixtures/mml2-testsuite/**/*'
    - 'spec/fixtures/mml3-testsuite/**/*'
    - 'spec/fixtures/mmlcore-testsuite/**/*'
    - 'spec/tasks/**/*'
